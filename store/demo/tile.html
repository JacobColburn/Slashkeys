<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>promo tile</title>
  <style>
    body {
      margin: 0; width: 440px; height: 280px; overflow: hidden;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
      background: radial-gradient(500px 320px at 25% 15%, #24322e 0%, #17181a 55%, #0e0f11 100%);
      font-family: "Segoe UI", system-ui, sans-serif;
    }
    .mark {
      font: 400 44px/1 ui-monospace, "Cascadia Code", Consolas, monospace;
      color: #74cfbe;
      background: #1f2023;
      border: 1px solid #333539;
      border-radius: 16px;
      width: 72px; height: 72px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
    }
    h1 { color: #e7e5e1; font-size: 30px; margin: 0; letter-spacing: 0.3px; }
    p { color: #a3a099; margin: 0; font-size: 15.5px; }
    p code {
      font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
      color: #74cfbe; background: rgba(79, 184, 165, 0.12);
      padding: 1px 7px; border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="mark">\</div>
  <h1>SlashKeys</h1>
  <p>Type <code>\shortcut</code> — get your full text</p>
</body>
</html>
